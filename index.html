<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Audit</title>
    <style>
        /* Minimalist dark mode styling goes here */
        body { background: #121212; color: #ffffff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 20px; margin: 10px; width: 80%; background: #333; color: white; border: none; font-size: 18px; }
        .active { border: 2px solid #4CAF50; }
    </style>
</head>
<body>

    <h2 id="status">Idle</h2>
    
    <button onclick="startTask('Deep Work')">Deep Work</button>
    <button onclick="startTask('AI/Rabbit Hole')">AI / Rabbit Hole</button>
    
    <hr style="border-color: #333; margin: 30px 0;">
    
    <button onclick="stopTask()" style="background: #8b0000;">STOP & SYNC</button>

    <script>
        // Replace with your generated Google Web App URL
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyBklxXm48CG7CHxcCTeV-Vr5_7SZSLVO2xKJKFL67ui6euIF2d9qpS-Etch8eLCx20KA/exec"; 
        
        let currentTask = null;
        let startTime = null;

        function startTask(taskName) {
            currentTask = taskName;
            startTime = Date.now();
            document.getElementById('status').innerText = "Tracking: " + taskName;
        }

        function stopTask() {
            if (!currentTask || !startTime) return;

            // Calculate duration in minutes
            const durationMs = Date.now() - startTime;
            const durationMinutes = (durationMs / 1000 / 60).toFixed(2);

            // Construct the payload
            const payload = {
                category: currentTask,
                duration: durationMinutes
            };

            // Fire the data to Google Sheets silently
            fetch(WEBHOOK_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            }).then(() => {
                document.getElementById('status').innerText = "Logged: " + currentTask + " (" + durationMinutes + "m)";
                currentTask = null;
                startTime = null;
            }).catch(err => console.error("Sync failed", err));
        }
    </script>
</body>
</html>
